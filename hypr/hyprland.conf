monitor=,preferred,auto,1
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Startup
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=Hyprland
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Portalları temizleyip sırayla başlatan sihirli satır:
exec-once = bash -c "killall -e xdg-desktop-portal-hyprland; killall -e xdg-desktop-portal-gtk; killall -e xdg-desktop-portal; /usr/lib/xdg-desktop-portal-hyprland & sleep 2; /usr/lib/xdg-desktop-portal &"
exec-once = waybar
exec-once = hyprpaper
exec-once = dunst
exec-once = nm-applet
exec-once = blueman-applet
exec-once = swaybg -m fill -i /home/mrcat/Pictures/wallpapers/MainWallpaper.jpg
input {
    kb_layout = us
    follow_mouse = 1
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 1                   # Ultra nazik kənar xətti
    
    # Aktiv border üçün neonu yığışdırdıq. 
    # Şəkildəki kimi sakit, tünd slate/göyümtül mat bir rəng qoyuruq (parıltısız):
    col.active_border = rgba(384551ff) 
    col.inactive_border = rgba(1e293b44)
    
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 0                      # Bütün küncləri tamamilə İTİ (0) edirik! Nəticə: düz bucaq.
    
    blur {
        enabled = true
        size = 8
        passes = 4
        vibrancy = 0.2
        brightness = 0.7
        ignore_opacity = true
        new_optimizations = true
    }
    
    shadow {
        enabled = true
        range = 15
        render_power = 4
        color = rgba(00000055)        # Heç bir rəngli neon parıltı olmayan, sadəcə təmiz kölgə
    }
}



#animations {
#    enabled = yes
#    bezier = web, 0.05, 0.9, 0.1, 1.05
#    animation = windows, 1, 6, web, slide
#    animation = border, 1, 10, default
#    animation = fade, 1, 7, default
#    animation = workspaces, 1, 5, default
#}

# macOS tarzı yaylanma için özel eğri
bezier = macos, 0.2, 0.9, 0.3, 1.05
animations {
    enabled = yes
    
    # "macOS" adını verdiğimiz eğriyi kullanıyoruz
    # 1. parametre: aktif mi
    # 2. parametre: hız (ms cinsinden süre)
    # 3. parametre: bezier eğrisinin adı
    
    animation = windowsMove, 1, 5, macos, slide
    animation = windowsIn, 1, 5, macos, slide
    animation = windowsOut, 1, 5, macos, slide
    animation = workspaces, 1, 6, macos, slidefade
}

dwindle {
    preserve_split = yes
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# Window Rules
#windowrule = match:class org.kde.dolphin, float on
windowrule = match:title Volume Control, float on
windowrule = match:class Alacritty, opacity 0.92 0.85
windowrule = match:class code, opacity 0.75 0.75

# Keybinds
$mod = SUPER

bind = $mod, T, exec, kitty
bind = $mod, Q, killactive
bind = $mod, M, exec, wlogout
bind = $mod SHIFT, M, exit
bind = $mod, E, exec, thunar
bind = $mod, B, exec, firefox
bind = $mod, F, togglefloating
bind = SUPER, D, exec, mpv --no-video ~/.local/share/hypr/spider-man-customized-web-thwip-sound-effect-1_ybmate.mp3 & wofi --show drun
#bind = SUPER, D, exec, paplay ~/.config/hypr/sounds/spiderman_web.mp3 & wofi --show drun
bind = $mod, R, exec, hyprlauncher
bind = $mod, L, exec, hyprlock
bind = $mod, V, exec, code

# Screenshot (wayshot)
# -f parametresini kaldırıp dosya yolunu direkt sona ekliyoruz
# Seçerek ekran görüntüsü alma
bind = , Print, exec, ~/.local/share/hypr/ss.sh area

# Tüm ekranı alma
bind = $mod, Print, exec, ~/.local/share/hypr/ss.sh

# Mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Odak
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# Workspace
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod , 7, workspace, 7
bind = $mod, 8, workspace, 8


bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
