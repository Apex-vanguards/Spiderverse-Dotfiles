# ╔══════════════════════════════════════════════════════════════╗
# ║   KITTY — SPIDER-MAN TOKYO NIGHT METRO                       ║
# ║   ~/.config/kitty/kitty.conf                                 ║
# ╚══════════════════════════════════════════════════════════════╝

# ── FONT ──────────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic

font_size        13.0
letter_spacing   0
word_spacing     0
line_height      1.1
disable_ligatures never

# ── CURSOR ────────────────────────────────────────────────────────────────────
cursor                  #89ddff
cursor_text_color       #1a1b26
cursor_shape            block
cursor_blink_interval   0.6
cursor_stop_blinking_after 0

# ── SCROLLBACK ────────────────────────────────────────────────────────────────
scrollback_lines        10000
scrollback_paging_history_size 0

# ── MOUSE ─────────────────────────────────────────────────────────────────────
mouse_hide_wait         2.0
url_color               #7aa2f7
url_style               curly
open_url_with           default
url_prefixes            file ftp ftps git http https irc ircs kitty mailto news sftp ssh
detect_urls             yes
copy_on_select          no

# ── PERFORMANCE ───────────────────────────────────────────────────────────────
repaint_delay    10
input_delay      3
sync_to_monitor  yes

# ── BELL ──────────────────────────────────────────────────────────────────────
enable_audio_bell        no
visual_bell_duration     0.1
visual_bell_color        #7aa2f7
window_alert_on_bell     yes
bell_on_tab              "🌐 "

# ── WINDOW LAYOUT ─────────────────────────────────────────────────────────────
enabled_layouts tall:bias=50;full_size=1;mirrored=false, horizontal, vertical, grid
remember_window_size     yes
initial_window_width     1000
initial_window_height    650

# ── BACKGROUND IMAGE ──────────────────────────────────────────────────────────
background_image_layout scaled
background_image_linear no
background_tint 0.7
window_padding_width     10 14
background_opacity       0.7
dynamic_background_opacity yes
background_blur          24

draw_minimal_borders     yes
window_margin_width      0
single_window_margin_width -1

# ── TABS ──────────────────────────────────────────────────────────────────────
tab_bar_edge             bottom
tab_bar_style            powerline
tab_powerline_style      slanted
tab_bar_min_tabs         1
tab_bar_align            left

tab_title_template        "{fmt.fg._7aa2f7}{index}{fmt.fg.tab}:{fmt.bold}{title[:16]}"
active_tab_title_template "{fmt.fg._89ddff}󰮯 {fmt.bold}{title[:20]}"

active_tab_foreground    #ffffff
active_tab_background    #383e5a
active_tab_font_style    bold

inactive_tab_foreground  #7aa2f7
inactive_tab_background  #16161e
inactive_tab_font_style  normal

tab_bar_background       #15161e
tab_bar_margin_color     #383e5a

# ── COLOR SCHEME — SPIDER-MAN / TOKYO NIGHT METRO ─────────────────────
background              #1a1b26
foreground              #a9b1d6

selection_foreground    #ffffff
selection_background    #383e5a

# Standart Terminal Rəngləri (Tokyo Night bazalı)
color0                  #15161e
color8                  #414868

# Red / Orange rənglər yerinə əsas vizual Göy və Firuzəyilər
color1                  #7aa2f7
color9                  #89ddff

color2                  #73daca
color10                 #b4f9f8

color3                  #e0af68
color11                 #e0af68

color4                  #2ac3de
color12                 #7dcfff

color5                  #bb9af3
color13                 #bb9af3

color6                  #b4f9f8
color14                 #0db9d7

color7                  #c0caf5
color15                 #c0caf5

# ── MARKS ─────────────────────────────────────────────────────────────────────
mark1_foreground #1a1b26
mark1_background #7aa2f7
mark2_foreground #1a1b26
mark2_background #89ddff
mark3_foreground #1a1b26
mark3_background #2ac3de

# ── ADVANCED ──────────────────────────────────────────────────────────────────
shell                   zsh
editor                  nvim
close_on_child_death    no
allow_remote_control    yes
listen_on               none
update_check_interval   0
startup_session         none
clipboard_control       write-clipboard write-primary read-clipboard-ask read-primary-ask
clipboard_max_size      512
allow_hyperlinks        yes
shell_integration       enabled
term                    xterm-kitty

# ── KEYBINDINGS ───────────────────────────────────────────────────────────────
clear_all_shortcuts     no

map ctrl+super+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+super+right    next_tab
map ctrl+super+left     previous_tab
map ctrl+shift+1        goto_tab 1
map ctrl+shift+2        goto_tab 2
map ctrl+shift+3        goto_tab 3
map ctrl+shift+4        goto_tab 4
map ctrl+shift+5        goto_tab 5

map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

map ctrl+equal          change_font_size all +1.0
map ctrl+minus          change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0

map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

map ctrl+shift+a>m      set_background_opacity +0.05
map ctrl+shift+a>l      set_background_opacity -0.05
map ctrl+shift+a>1      set_background_opacity 1
map ctrl+shift+a>d      set_background_opacity default
